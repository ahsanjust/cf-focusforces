<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusForces</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Hero Header -->
  <header class="hero" role="banner">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-content">
      <div class="logo-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="rgba(255,255,255,0.95)" stroke="none"/>
          <path d="M2 12l10 5 10-5M2 17l10 5 10-5" stroke="rgba(255,255,255,0.7)" fill="none"/>
        </svg>
      </div>
      <div class="hero-text">
        <h1>FocusForces</h1>
        <span class="hero-subtitle">Focus. Track. Compete.</span>
      </div>
    </div>
  </header>

  <!-- Settings Panel -->
  <section class="panel" aria-label="Settings">
    <div class="panel-header">
      <svg class="panel-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </div>

    <!-- Theme Picker -->
    <div class="setting-card">
      <div class="setting-label">Theme</div>
      <div class="theme-picker" id="theme-picker" role="radiogroup" aria-label="Select theme">
        <button class="theme-dot" data-theme="default" role="radio" aria-checked="true" title="Default">
          <span class="dot-color" style="background: linear-gradient(135deg, #4338ca, #818cf8)"></span>
          <span class="dot-label">Default</span>
        </button>
        <button class="theme-dot" data-theme="light" role="radio" aria-checked="false" title="Light">
          <span class="dot-color" style="background: linear-gradient(135deg, #c0c8d4, #f0f2f5)"></span>
          <span class="dot-label">Light</span>
        </button>
        <button class="theme-dot" data-theme="dark" role="radio" aria-checked="false" title="Dark">
          <span class="dot-color" style="background: linear-gradient(135deg, #0e0e1a, #282842)"></span>
          <span class="dot-label">Dark</span>
        </button>
        <button class="theme-dot" data-theme="amoled" role="radio" aria-checked="false" title="AMOLED">
          <span class="dot-color dot-amoled"></span>
          <span class="dot-label">AMOLED</span>
        </button>
        <button class="theme-dot" data-theme="blue" role="radio" aria-checked="false" title="Blue">
          <span class="dot-color" style="background: linear-gradient(135deg, #1e3a8a, #3b82f6)"></span>
          <span class="dot-label">Blue</span>
        </button>
        <button class="theme-dot" data-theme="minimal" role="radio" aria-checked="false" title="Minimal">
          <span class="dot-color" style="background: linear-gradient(135deg, #1a1a1a, #555555)"></span>
          <span class="dot-label">Minimal</span>
        </button>
        <button class="theme-dot" data-theme="contrast" role="radio" aria-checked="false" title="High Contrast">
          <span class="dot-color" style="background: linear-gradient(135deg, #422006, #fde68a)"></span>
          <span class="dot-label">Contrast</span>
        </button>
      </div>
    </div>

    <!-- Zen Mode Toggle -->
    <div class="setting-card">
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">Zen Mode</span>
          <span class="setting-desc">Distraction-free problem solving</span>
        </div>
        <label class="switch" for="zen-toggle" title="Toggle Zen Mode">
          <input type="checkbox" id="zen-toggle" aria-label="Toggle Zen Mode">
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
        </label>
      </div>
    </div>

    <!-- Contest Reminders -->
    <div class="setting-card">
      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">Contest Reminders</span>
          <span class="setting-desc">Notify before upcoming contests</span>
        </div>
        <label class="switch" for="reminder-toggle" title="Toggle contest reminders">
          <input type="checkbox" id="reminder-toggle" checked aria-label="Toggle contest reminders">
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
        </label>
      </div>
      <div id="reminder-section" class="reminder-section" style="display: none;">
        <div class="reminder-header">
          <span class="reminder-title">Reminder Times</span>
          <button type="button" class="save-btn" id="edit-reminders">Save</button>
        </div>
        <div class="reminder-chips" id="reminder-options">
          <label class="reminder-chip">
            <input type="checkbox" class="reminder-item" value="86400" checked>
            <span>1 Day</span>
          </label>
          <label class="reminder-chip">
            <input type="checkbox" class="reminder-item" value="3600" checked>
            <span>1 Hour</span>
          </label>
          <label class="reminder-chip">
            <input type="checkbox" class="reminder-item" value="1800" checked>
            <span>30 Min</span>
          </label>
          <label class="reminder-chip">
            <input type="checkbox" class="reminder-item" value="600" checked>
            <span>10 Min</span>
          </label>
          <label class="reminder-chip">
            <input type="checkbox" class="reminder-item" value="300" checked>
            <span>5 Min</span>
          </label>
        </div>
      </div>
    </div>
  </section>

  <!-- Timer Panel -->
  <section class="panel timer-panel" aria-label="Focus Timer">
    <div class="panel-header timer-header">
      <svg class="panel-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Focus Timer</span>
      <div class="timer-mode-toggle" role="radiogroup" aria-label="Timer mode">
        <button class="timer-mode-btn active" data-mode="countdown" type="button" role="radio" aria-checked="true">Countdown</button>
        <button class="timer-mode-btn" data-mode="stopwatch" type="button" role="radio" aria-checked="false">Stopwatch</button>
      </div>
    </div>
    <div class="timer-body">
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-inputs" id="timer-inputs">
        <label>
          <input type="number" id="timer-mm" min="0" max="999" placeholder="MM" value="25"> m
        </label>
        <label>
          <input type="number" id="timer-ss" min="0" max="59" placeholder="SS" value="0"> s
        </label>
      </div>
      <div class="timer-controls">
        <button type="button" class="timer-btn primary" id="timer-action">Start</button>
        <button type="button" class="timer-btn" id="timer-reset">Reset</button>
      </div>
    </div>
  </section>

  <!-- Contests Section -->
  <section class="contests-section" aria-label="Upcoming contests">
    <div class="panel-header contests-header">
      <svg class="panel-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Contests</span>
    </div>
    <div id="contest-list" class="contest-list" aria-live="polite" aria-atomic="false">
      <div class="state-message shimmer" aria-label="Loading contests">Loading contests...</div>
    </div>
  </section>

  <footer class="footer" role="contentinfo">
    <span>
      <a href="https://codeforces.com/apiHelp" target="_blank" rel="noopener">Codeforces</a> &middot;
      <a href="https://www.codechef.com/" target="_blank" rel="noopener">CodeChef</a> &middot;
      <a href="https://atcoder.jp/" target="_blank" rel="noopener">AtCoder</a> &middot;
      <a href="https://leetcode.com/" target="_blank" rel="noopener">LeetCode</a>
    </span>
    <span class="made-by">Made by <a href="https://codeforces.com/profile/Ahsan_" target="_blank" rel="noopener">Ahsan_</a></span>
  </footer>

  <script src="contest-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
